<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>番号マグネット進捗ボード</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #64707d;
      --line: #cfd7df;
      --paper: #f7f4ec;
      --board: #2f6b5f;
      --board-dark: #235349;
      --chalk: #f8fbf8;
      --accent: #e3b23c;
      --done: #247f5b;
      --blue: #2f6f9f;
      --red: #b84a42;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.16);
      --magnet-size: 58px;
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.34) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.34) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
      color: var(--ink);
    }

    body.no-scroll {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .app.pseudo-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 50;
      min-height: 100dvh;
      overflow: auto;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.34) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.34) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
    }

    .app.fit-board {
      overflow: hidden;
    }

    .app.fit-board .toolbar {
      padding-block: clamp(8px, 1.5vh, 14px);
    }

    .app.fit-board .board-wrap {
      min-height: 0;
      padding-block: clamp(8px, 1.5vh, 14px);
      grid-template-rows: auto minmax(0, 1fr);
    }

    .app.fit-board .status {
      font-size: clamp(0.78rem, 1.3vw, 0.95rem);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px clamp(14px, 3vw, 28px);
      background: #fffdf7;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 14px rgba(31, 41, 51, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2vw, 2rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 86px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1;
    }

    .field input {
      width: 100%;
      height: 42px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      text-align: center;
      font-size: 1rem;
    }

    .action {
      min-width: 44px;
      height: 44px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      background: var(--ink);
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(31, 41, 51, 0.18);
    }

    .action:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      box-shadow: none;
    }

    .action.reset {
      background: var(--red);
    }

    .action.apply {
      min-width: 76px;
      background: var(--blue);
    }

    .board-wrap {
      padding: clamp(14px, 3vw, 28px);
      display: grid;
      gap: 14px;
      min-height: 0;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .progress-shell {
      flex: 1 1 220px;
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: #d9e1e8;
      border: 1px solid #c1ccd5;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--done));
      transition: width 180ms ease;
    }

    .board {
      min-height: min(70vh, 760px);
      padding: 14px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 24px 24px, rgba(255,255,255,0.10) 0 2px, transparent 2px),
        linear-gradient(135deg, var(--board), var(--board-dark));
      background-size: 42px 42px, auto;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: repeat(var(--stage-count), minmax(150px, 1fr));
      gap: 12px;
      overflow-x: auto;
    }

    .app.fit-board .board {
      min-height: 0;
      height: 100%;
      overflow: hidden;
      gap: clamp(5px, 0.9vw, 10px);
      padding: clamp(6px, 1vw, 12px);
      grid-template-columns: repeat(var(--stage-count), minmax(0, 1fr));
    }

    .stage {
      min-width: 150px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding: 10px;
      border: 2px solid rgba(255, 255, 255, 0.42);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
    }

    .app.fit-board .stage {
      min-width: 0;
      gap: clamp(4px, 0.8vh, 8px);
      padding: clamp(5px, 0.9vw, 9px);
      overflow: hidden;
    }

    .stage-head {
      display: grid;
      gap: 6px;
    }

    .stage-title {
      min-height: 38px;
      padding: 7px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.14);
      color: var(--chalk);
      font-size: clamp(1rem, 1.6vw, 1.28rem);
      font-weight: 800;
      text-align: center;
    }

    .app.fit-board .stage-title {
      min-height: 0;
      padding: clamp(4px, 0.7vh, 7px) 6px;
      font-size: clamp(0.78rem, 1.5vw, 1.08rem);
    }

    .stage-title input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: center;
    }

    .stage-count {
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.86rem;
      text-align: center;
    }

    .app.fit-board .stage-count {
      font-size: clamp(0.68rem, 1.2vw, 0.8rem);
      line-height: 1;
    }

    .magnet-grid {
      align-content: start;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
      gap: 9px;
    }

    .app.fit-board .magnet-grid {
      grid-template-columns: repeat(auto-fill, var(--magnet-size));
      gap: var(--magnet-gap, 6px);
      justify-content: center;
      overflow: hidden;
    }

    .magnet-wrap {
      position: relative;
      min-width: 0;
      aspect-ratio: 1;
    }

    .app.fit-board .magnet-wrap {
      width: var(--magnet-size);
      height: var(--magnet-size);
    }

    .magnet {
      width: 100%;
      height: 100%;
      aspect-ratio: 1;
      min-width: 0;
      border-radius: 999px;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.98), rgba(255,255,255,0.82) 31%, transparent 32%),
        linear-gradient(145deg, #fff8d9, #e8cc62 45%, #b98f22);
      border: 2px solid rgba(98, 76, 18, 0.36);
      color: #2c2718;
      display: grid;
      place-items: center;
      font-size: clamp(1.3rem, 2.2vw, 2rem);
      font-weight: 900;
      line-height: 1;
      box-shadow:
        inset 0 -5px 9px rgba(111, 80, 18, 0.25),
        0 5px 10px rgba(10, 30, 26, 0.28);
      user-select: none;
      transition: transform 100ms ease, box-shadow 100ms ease;
    }

    .app.fit-board .magnet {
      font-size: clamp(0.68rem, calc(var(--magnet-size) * 0.42), 1.8rem);
    }

    .magnet:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 -5px 9px rgba(111, 80, 18, 0.25),
        0 8px 14px rgba(10, 30, 26, 0.32);
    }

    .magnet:active {
      transform: translateY(1px) scale(0.98);
    }

    .back-chip {
      position: absolute;
      right: -3px;
      top: -3px;
      z-index: 2;
      min-width: 34px;
      height: 24px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ffffff;
      color: var(--red);
      border: 1px solid rgba(184, 74, 66, 0.38);
      box-shadow: 0 4px 10px rgba(10, 30, 26, 0.24);
      font-size: 0.72rem;
      font-weight: 900;
      line-height: 1;
    }

    .app.fit-board .back-chip {
      right: -2px;
      top: -2px;
      min-width: max(20px, calc(var(--magnet-size) * 0.48));
      height: max(15px, calc(var(--magnet-size) * 0.32));
      padding: 0 4px;
      font-size: clamp(0.48rem, calc(var(--magnet-size) * 0.16), 0.68rem);
    }

    .back-chip:disabled {
      cursor: not-allowed;
      opacity: 0.34;
      box-shadow: none;
    }

    .stage:last-child .magnet {
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.98), rgba(255,255,255,0.82) 31%, transparent 32%),
        linear-gradient(145deg, #ddf5e8, #78c49c 48%, #2c805e);
      border-color: rgba(22, 83, 57, 0.4);
    }

    .empty {
      padding: 20px 8px;
      border: 1px dashed rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      font-size: 0.95rem;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      max-width: calc(100vw - 28px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(31, 41, 51, 0.92);
      color: white;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -4px);
    }

    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: stretch;
      }

      .field {
        flex: 1 1 88px;
      }

      .action.apply {
        flex: 1 1 100%;
      }

      .board {
        grid-template-columns: repeat(var(--stage-count), minmax(136px, 78vw));
        scroll-snap-type: x proximity;
      }

      .stage {
        scroll-snap-align: start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <h1>番号マグネット進捗ボード</h1>
      <section class="controls" aria-label="設定">
        <div class="field">
          <label for="startNumber">開始</label>
          <input id="startNumber" type="number" min="1" value="1">
        </div>
        <div class="field">
          <label for="endNumber">終了</label>
          <input id="endNumber" type="number" min="1" value="35">
        </div>
        <div class="field">
          <label for="stageTotal">枠</label>
          <input id="stageTotal" type="number" min="2" max="8" value="2">
        </div>
        <button class="action apply" id="applyButton" type="button">反映</button>
        <button class="action" id="fullscreenButton" type="button" title="全画面表示" aria-label="全画面表示">⛶</button>
        <button class="action" id="undoButton" type="button" title="元に戻す" aria-label="元に戻す">↶</button>
        <button class="action reset" id="resetButton" type="button" title="最初に戻す" aria-label="最初に戻す">↺</button>
      </section>
    </header>

    <section class="board-wrap">
      <div class="status">
        <strong id="summaryText">完了 0 / 35</strong>
        <div class="progress-shell" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
      <section class="board" id="board" aria-label="進捗ボード"></section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const defaults = {
      start: 1,
      end: 35,
      stages: 2,
      labels: ["未完了", "完了"],
      positions: {},
      history: []
    };

    const els = {
      start: document.querySelector("#startNumber"),
      end: document.querySelector("#endNumber"),
      stages: document.querySelector("#stageTotal"),
      apply: document.querySelector("#applyButton"),
      app: document.querySelector(".app"),
      fullscreen: document.querySelector("#fullscreenButton"),
      undo: document.querySelector("#undoButton"),
      reset: document.querySelector("#resetButton"),
      board: document.querySelector("#board"),
      summary: document.querySelector("#summaryText"),
      progress: document.querySelector("#progressBar"),
      toast: document.querySelector("#toast")
    };

    const storageKey = "school-progress-magnet-board";
    let state = loadState();
    let toastTimer = null;
    let pseudoFullscreen = false;
    let fitTimer = null;

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return normalizeState(saved || defaults);
      } catch {
        return normalizeState(defaults);
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function normalizeState(next) {
      const start = clampNumber(next.start, 1, 999, defaults.start);
      let end = clampNumber(next.end, 1, 999, defaults.end);
      if (end < start) end = start;
      const stages = clampNumber(next.stages, 2, 8, defaults.stages);
      const labels = makeLabels(stages, Array.isArray(next.labels) ? next.labels : []);
      const positions = {};

      for (let number = start; number <= end; number += 1) {
        const savedPosition = Number(next.positions && next.positions[number]);
        positions[number] = Number.isInteger(savedPosition) ? Math.min(Math.max(savedPosition, 0), stages - 1) : 0;
      }

      return {
        start,
        end,
        stages,
        labels,
        positions,
        history: Array.isArray(next.history) ? next.history.slice(-80) : []
      };
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isInteger(number)) return fallback;
      return Math.min(Math.max(number, min), max);
    }

    function makeLabels(count, previous) {
      if (count === 2) {
        return [previous[0] || "未完了", previous[1] || "完了"];
      }

      return Array.from({ length: count }, (_, index) => {
        if (previous[index]) return previous[index];
        if (index === 0) return "未着手";
        if (index === count - 1) return "完了";
        return `${index}段階`;
      });
    }

    function getNumbers() {
      return Array.from({ length: state.end - state.start + 1 }, (_, index) => state.start + index);
    }

    function render() {
      els.start.value = state.start;
      els.end.value = state.end;
      els.stages.value = state.stages;
      els.undo.disabled = state.history.length === 0;
      els.board.style.setProperty("--stage-count", state.stages);
      els.board.innerHTML = "";

      const numbersByStage = Array.from({ length: state.stages }, () => []);
      for (const number of getNumbers()) {
        numbersByStage[state.positions[number]].push(number);
      }

      numbersByStage.forEach((numbers, stageIndex) => {
        const stage = document.createElement("article");
        stage.className = "stage";

        const head = document.createElement("div");
        head.className = "stage-head";

        const title = document.createElement("div");
        title.className = "stage-title";
        const input = document.createElement("input");
        input.value = state.labels[stageIndex];
        input.setAttribute("aria-label", `${stageIndex + 1}番目の枠名`);
        input.addEventListener("change", () => {
          state.labels[stageIndex] = input.value.trim() || makeLabels(state.stages, [])[stageIndex];
          saveState();
          render();
        });
        title.append(input);

        const count = document.createElement("div");
        count.className = "stage-count";
        count.textContent = `${numbers.length}人`;

        head.append(title, count);

        const grid = document.createElement("div");
        grid.className = "magnet-grid";

        if (numbers.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "なし";
          grid.append(empty);
        } else {
          numbers.forEach((number) => {
            const wrap = document.createElement("div");
            wrap.className = "magnet-wrap";

            const button = document.createElement("button");
            button.className = "magnet";
            button.type = "button";
            button.textContent = number;
            button.setAttribute("aria-label", `${number}番を進める`);
            button.addEventListener("click", () => advanceNumber(number));

            const backButton = document.createElement("button");
            backButton.className = "back-chip";
            backButton.type = "button";
            backButton.textContent = "戻る";
            backButton.disabled = stageIndex === 0;
            backButton.setAttribute("aria-label", `${number}番を戻す`);
            backButton.addEventListener("click", (event) => {
              event.stopPropagation();
              moveBackNumber(number);
            });

            wrap.append(button, backButton);
            grid.append(wrap);
          });
        }

        stage.append(head, grid);
        els.board.append(stage);
      });

      renderSummary();
      scheduleFitMagnets();
    }

    function renderSummary() {
      const numbers = getNumbers();
      const finalStage = state.stages - 1;
      const completed = numbers.filter((number) => state.positions[number] === finalStage).length;
      const percent = numbers.length ? Math.round((completed / numbers.length) * 100) : 0;
      els.summary.textContent = `完了 ${completed} / ${numbers.length}`;
      els.progress.style.width = `${percent}%`;
    }

    function advanceNumber(number) {
      const from = state.positions[number];
      if (from >= state.stages - 1) {
        showToast(`${number}番は完了です`);
        return;
      }

      const to = from + 1;
      state.positions[number] = to;
      state.history.push({ number, from, to });
      state.history = state.history.slice(-80);
      saveState();
      render();
      showToast(`${number}番 → ${state.labels[to]}`);
    }

    function moveBackNumber(number) {
      const from = state.positions[number];
      if (from <= 0) {
        showToast(`${number}番は最初の枠です`);
        return;
      }

      const to = from - 1;
      state.positions[number] = to;
      state.history.push({ number, from, to });
      state.history = state.history.slice(-80);
      saveState();
      render();
      showToast(`${number}番 → ${state.labels[to]}`);
    }

    function applySettings() {
      const next = normalizeState({
        ...state,
        start: Number(els.start.value),
        end: Number(els.end.value),
        stages: Number(els.stages.value),
        labels: state.labels,
        history: []
      });
      state = next;
      saveState();
      render();
      showToast("反映しました");
    }

    function undo() {
      const last = state.history.pop();
      if (!last) return;
      state.positions[last.number] = last.from;
      saveState();
      render();
      showToast(`${last.number}番を戻しました`);
    }

    function resetBoard() {
      for (const number of getNumbers()) {
        state.positions[number] = 0;
      }
      state.history = [];
      saveState();
      render();
      showToast("最初に戻しました");
    }

    async function toggleFullscreen() {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
        return;
      }

      if (pseudoFullscreen) {
        setPseudoFullscreen(false);
        return;
      }

      const requestFullscreen = els.app.requestFullscreen
        || els.app.webkitRequestFullscreen
        || els.app.msRequestFullscreen;

      if (requestFullscreen) {
        try {
          await requestFullscreen.call(els.app);
          updateFullscreenButton();
          return;
        } catch {
          setPseudoFullscreen(true);
          showToast("画面いっぱいにしました");
          return;
        }
      }

      setPseudoFullscreen(true);
      showToast("画面いっぱいにしました");
    }

    function setPseudoFullscreen(enabled) {
      pseudoFullscreen = enabled;
      els.app.classList.toggle("pseudo-fullscreen", enabled);
      els.app.classList.toggle("fit-board", enabled);
      document.body.classList.toggle("no-scroll", enabled);
      updateFullscreenButton();
      scheduleFitMagnets();
    }

    function updateFullscreenButton() {
      const isFullscreen = Boolean(document.fullscreenElement) || pseudoFullscreen;
      els.fullscreen.textContent = isFullscreen ? "□" : "⛶";
      els.fullscreen.title = isFullscreen ? "全画面を終了" : "全画面表示";
      els.fullscreen.setAttribute("aria-label", els.fullscreen.title);
    }

    function showToast(message) {
      window.clearTimeout(toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add("show");
      toastTimer = window.setTimeout(() => els.toast.classList.remove("show"), 1300);
    }

    function scheduleFitMagnets() {
      window.clearTimeout(fitTimer);
      fitTimer = window.setTimeout(fitMagnetsToBoard, 40);
    }

    function fitMagnetsToBoard() {
      const shouldFit = pseudoFullscreen || Boolean(document.fullscreenElement);
      els.app.classList.toggle("fit-board", shouldFit);

      if (!shouldFit) {
        els.board.style.removeProperty("--magnet-size");
        els.board.style.removeProperty("--magnet-gap");
        return;
      }

      const grids = Array.from(els.board.querySelectorAll(".magnet-grid"));
      const measuredGrids = grids
        .map((grid) => ({
          grid,
          count: grid.querySelectorAll(".magnet-wrap").length,
          rect: grid.getBoundingClientRect()
        }))
        .filter((item) => item.count > 0 && item.rect.width > 0 && item.rect.height > 0);

      if (measuredGrids.length === 0) return;

      const size = Math.min(
        ...measuredGrids.map((item) => calculateMagnetSize(item.rect.width, item.rect.height, item.count))
      );
      const gap = calculateMagnetGap(size);

      els.board.style.setProperty("--magnet-size", `${size}px`);
      els.board.style.setProperty("--magnet-gap", `${gap}px`);
      window.requestAnimationFrame(() => shrinkIfOverflow(size));
    }

    function calculateMagnetSize(width, height, count) {
      const safeWidth = Math.max(0, width - 8);
      const safeHeight = Math.max(0, height - 8);
      const maxSize = Math.floor(Math.min(74, safeWidth, safeHeight));

      for (let size = maxSize; size >= 12; size -= 1) {
        const gap = calculateMagnetGap(size);

        for (let columns = 1; columns <= count; columns += 1) {
          const rows = Math.ceil(count / columns);
          const neededWidth = columns * size + (columns - 1) * gap;
          const neededHeight = rows * size + (rows - 1) * gap;

          if (neededWidth <= safeWidth && neededHeight <= safeHeight) {
            return size;
          }
        }
      }

      return 12;
    }

    function calculateMagnetGap(size) {
      return Math.max(2, Math.min(7, Math.floor(size * 0.12)));
    }

    function shrinkIfOverflow(currentSize) {
      const shouldFit = pseudoFullscreen || Boolean(document.fullscreenElement);
      if (!shouldFit) return;

      let size = currentSize;
      let attempts = 0;

      while (size > 10 && hasBoardOverflow() && attempts < 30) {
        size -= 1;
        els.board.style.setProperty("--magnet-size", `${size}px`);
        els.board.style.setProperty("--magnet-gap", `${calculateMagnetGap(size)}px`);
        attempts += 1;
      }
    }

    function hasBoardOverflow() {
      const boardHasOverflow = els.board.scrollWidth > els.board.clientWidth + 1
        || els.board.scrollHeight > els.board.clientHeight + 1;
      if (boardHasOverflow) return true;

      return Array.from(els.board.querySelectorAll(".stage, .magnet-grid")).some((element) => (
        element.scrollWidth > element.clientWidth + 1
        || element.scrollHeight > element.clientHeight + 1
      ));
    }

    els.apply.addEventListener("click", applySettings);
    els.fullscreen.addEventListener("click", toggleFullscreen);
    els.undo.addEventListener("click", undo);
    els.reset.addEventListener("click", resetBoard);
    document.addEventListener("fullscreenchange", () => {
      if (document.fullscreenElement) {
        setPseudoFullscreen(false);
        els.app.classList.add("fit-board");
        scheduleFitMagnets();
      } else {
        updateFullscreenButton();
        scheduleFitMagnets();
      }
    });
    document.addEventListener("webkitfullscreenchange", () => {
      updateFullscreenButton();
      scheduleFitMagnets();
    });
    window.addEventListener("resize", scheduleFitMagnets);

    [els.start, els.end, els.stages].forEach((input) => {
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") applySettings();
      });
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && pseudoFullscreen) {
        setPseudoFullscreen(false);
      }
    });

    render();
    updateFullscreenButton();
  </script>
</body>
</html>
